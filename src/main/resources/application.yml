spring:
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: jdbc:h2:file:./data/financeapp;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-in-production-32chars}
    expiration-ms: 86400000

gemini:
  api-key: ${GEMINI_API_KEY:}
